<!DOCTYPE html>
<html>
<head>
<title>Cloud Load Balancer Simulator</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

button{
padding:10px 20px;
margin:10px;
}

.server{
padding:15px;
margin:10px;
background:white;
border-radius:8px;
display:inline-block;
}
</style>
</head>

<body>

<h1>Cloud Load Balancer Simulation</h1>

<button onclick="sendRequest()">Send Request</button>

<div id="servers"></div>

<script>

let servers=[
{ id:1, requests:0 },
{ id:2, requests:0 },
{ id:3, requests:0 }
]

let current=0

function sendRequest(){

servers[current].requests++

current=(current+1)%servers.length

render()

}

function render(){

let html=""

servers.forEach(s=>{
html+=`
<div class="server">
<h3>Server ${s.id}</h3>
<p>Requests: ${s.requests}</p>
</div>`
})

document.getElementById("servers").innerHTML=html

}

render()

</script>

</body>
</html>
