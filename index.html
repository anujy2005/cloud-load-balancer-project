<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudEdu Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn {
      padding: 10px 15px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #2980b9;
    }
  </style>
</head>

<body>

<header>
  CloudEdu Student Portal
</header>

<div class="container">

  <div class="card">
    <h3>Welcome</h3>
    <p>This is a simple cloud-based student resource portal.</p>
  </div>

  <div class="card">
    <h3>Resources</h3>
    <p>Access notes, PDFs, and study materials.</p>
    <button class="btn">View Resources</button>
  </div>

  <div class="card">
    <h3>Load Balancer Demo</h3>
    <p>Simulated request distribution system.</p>
    <button class="btn">Test System</button>
  </div>

</div>

</body>
</html>
